[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    -ra
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    security: 安全相关测试

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning